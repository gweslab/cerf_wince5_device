<script language="javascript">


// NOTE: the time sent to us in g_TIMESERVICE_Hour is 24 hour clock (0-23).  This will have to be adjusted for AM / PM

// file local variables
var l_TimeMode	= 0;	// 0 = Internet time server, 1 = Manual

var l_CurrentTime = String(g_TIMESERVICE_Month +","+g_TIMESERVICE_Day+","+g_TIMESERVICE_Year+","+g_TIMESERVICE_Hour+","+g_TIMESERVICE_Minute+","+g_TIMESERVICE_Second);
var _TimeParts = new String(l_CurrentTime).split(",");

var _GMTOffset	= 0;
var _ZoneName	= 1;

var l_AMPMOptions	= new Array();
l_AMPMOptions[0]	= new String("AM:"+Loc("AM"));
l_AMPMOptions[1]	= new String("PM:"+Loc("PM"));
var l_AMPM = "AM";

var TwentyFourHour = parseInt(_TimeParts[3]);
if (TwentyFourHour < 1)
{
	_TimeParts[3] = 12;
}

if (12 == TwentyFourHour)
{
	l_AMPM = "PM";
}

if (TwentyFourHour > 12)
{
	_TimeParts[3] %= 12;
	l_AMPM = "PM";
}	

var l_RadioSelections = new Array();

var Months = new Array("PlaceHolder", Loc("Jan"), Loc("Feb"), Loc("Mar"), Loc("Apr"), Loc("May"), Loc("Jun"), Loc("Jul"), Loc("Aug"), Loc("Sep"), Loc("Oct"), Loc("Nov"), Loc("Dec"));

function AddMonthOptions(Selected)
{
	
	for (var iMonth = 1; iMonth < Months.length; iMonth++)
	{
		Select = (Selected == iMonth) ? " SELECTED" : " ";

		document.write("<OPTION value=" + iMonth + Select + ">" + Months[iMonth] + "</OPTION>");
	}
}	

function FindDaysInMonth(Month, Year)
{
	// figure out how many days are in the chosen month
	var iEndDay = 30;
	
	Month = parseInt(Month);
	Year = parseInt(Year);
	switch (Month)
	{
		case 2:
			// Handle leap years
			if(((Year % 4) == 0) && ((Year % 100) != 0))	// Yes I don't handle the 400 year rule but really not going to matter I don't think.
			{
				iEndDay = 29;
			}else{
				iEndDay = 28;
			}
			break;
			
		case 4:
		case 6:
		case 9:
		case 11:
			iEndDay = 30;
			break;
			
		default:
			iEndDay = 31;
	}
	
	return iEndDay;
}


function AddDaysInMonthOptions(Month, Year, Selected)
{
	// dealing with leap year etc is fun....
	var iEndDay = FindDaysInMonth(Month, Year);
	
	if (Selected > iEndDay)
		Selected = 1;
	
	for (var iDay = 1; iDay <= iEndDay; iDay++)
	{
		Select = (Selected == iDay) ? " SELECTED" : " ";

		document.write("<OPTION value=" + iDay + Select + ">" + iDay + "</OPTION>");
	}
}

function FormatTime()
{
	var TimeString = "";
	
	TimeString += _TimeParts[3] + ":";
	
	if (_TimeParts[4] < 10)
		TimeString += "0";
	TimeString += _TimeParts[4] + ":";

	if (_TimeParts[5] < 10)
		TimeString += "0";
	TimeString += _TimeParts[5];
	
	return TimeString;
}

function AddYearOptions(Selected)
{
	AddNumericOptions(2000, 2020, Selected);
}


function UpdateDays()
{	
	enableApply();

	// need to reload the days dropdown depending on the new month / year
	M = FindObject("TIMESERVICE_Month");
	Y = FindObject("TIMESERVICE_Year");
	D = FindObject("TIMESERVICE_Day");
	
	// grab the currently selected day
	var SelectedDay = D.value;
	
	var days = FindDaysInMonth(M.value, Y.value);

	var cur = D.options.length;
	
	if (cur < days)
	{
		// need to add options
		for (i = cur; i < days; i++)
		{
			var oOption = document.createElement("OPTION");
			D.options.add(oOption);
			oOption.innerText = (i+1);
			oOption.value = (i+1);
		}
	}
	
	if (cur > days)
	{
		// need to remove options
		for (i = cur; i > days; i--)
		{
			D.options.remove(i-1);
		}
	}
		
	if (SelectedDay > days)
	{
		// need to set the selection to the last possible day
		D.value = days;
	}	
}
	
function ValidateHour(Field)
{
	if (Field.value < 1 || Field.value > 12)
	{
		FlagError(Field, "BadHour");
		return false;
	}else{
		NoError(Field);
		return true;
	}
}

function ValidateMinute(Field)
{
	if (Field.value < 0 || Field.value > 59)
	{
		FlagError(Field, "BadMinute");
		return false;
	}else{
		NoError(Field);
		return true;
	}
}

function ValidateSecond(Field)
{
	if (Field.value < 0 || Field.value > 59)
	{
		FlagError(Field, "BadSecond");
		return false;
	}else{
		NoError(Field);
		return true;
	}
}

		document.write("<INPUT id=minute onKeyPress=NumOnly(); onKeyUp=enableApply(); onBlur=ValidateMinute(this); size=4 maxlength=2 name=TIMESERVICE_Minute value="+_TimeParts[4]+"> ");
		document.write("<INPUT id=second onKeyPress=NumOnly(); onKeyUp=enableApply(); onBlur=ValidateSecond(this); size=5 maxlength=2 name=TIMESERVICE_Second value="+_TimeParts[5]+"> ");
		
		document.write("<SELECT id=am_pm onchange=enableApply() name=TimeSetAM>");
			AddOptionsFromArray(l_AMPMOptions, l_AMPM);
		document.write("</SELECT> ");
		document.write("</TD>");
	EndTR();

}

function InitData()
{
	l_CurrentPaneID = (0 == l_TimeMode) ? "TimeServerForm" : "ManualTimeForm";
	ShowHidden(l_CurrentPaneID);
}

function EnableTimeServer(enable)
{
	var clientEnable = FindObject("TIMESERVICE_ClientEnabled");
	var serverEnable = FindObject("TIMESERVICE_ServerEnabled");
		
	if(enable) {
		clientEnable.value="1";
		serverEnable.value="1";
	} else {
		clientEnable.value="0";
		serverEnable.value="0";
	}
	
}

function SubmitHandler(SubmitVar) 
{		
	ClearError();
	var bOK = true;
	
	//SubmitVar.action = "debug";
	
	var FormVar = FindObject("EditForm");
	
	if ("0" == FormVar.TIMESERVICE_ClientEnabled.value)
	{
		// in manual validate the entered time
		bOK &= ValidateHour(FormVar.hour); 
		bOK &= ValidateMinute(FormVar.minute)
		bOK &= ValidateSecond(FormVar.second)
	}
		
	if (bOK)
	{
		// the module wants time in 24 hour format (0-23)
		Hour = parseInt(FormVar.hour.value);
		if ("AM" == FormVar.am_pm.value &&  12 == Hour)
		{
			FormVar.hour.value = 0;
		}
		
		if ("PM" == FormVar.am_pm.value && Hour != 12)
		{
			FormVar.hour.value = Hour + 12;
		}
		
		GlobalSubmitHandler(SubmitVar);		
		return true;		
	}else{
		FocusFirstError();
		return false;
	}
}

function OnReset()
{
	InitData();
}

}
