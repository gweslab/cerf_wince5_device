<noscript><body bgcolor=#d6dff5><center><b><font color=#6487dc>Javascript support is required to display this page</font></b></center></body></noscript>
<script src="ParsedGeneralUtils.js" language="javascript"></script><script src="../remoteadminimages/GeneralUtils.js" language="javascript"></script>
<script src="General_Loc.js" language="javascript"></script>
<script src="ChangePassword_Loc.js" language="javascript"></script>
<script language="javascript">

	
// Local variables
// (NOTE: make sure these match the values in DeviceConfig.htm)
var l_PasswordMinLen = 3;
var l_PasswordMaxLen = 16;

function ShowPasswordErrors() 
{
	if(window.g_PASSWORD_SuccessfullyChanged) 
	{
		return new String(Loc("PasswordChanged"));
	}
	if(window.g_PASSWORD_Mismatch) 
	{
		return new String(Loc("PasswordMismatch"));
	} 
	if(window.g_PASSWORD_InvalidPassword) 
	{
		return new String(Loc("PasswordInvalid"));
	}
	return new String("");
}

function SubmitHandler(SubmitVar)
{
	var bOK = true;
	ClearError();
	
	var form = FindObject("EditForm");
	
	if(window.g_PASSWORD_PasswordSet) {
		// FIXFIX: old password checking is currently turned off in the backend.
		//bOK = ValidatePW(form.PASSWORD_PWDOLD, l_PasswordMinLen, l_PasswordMaxLen);
	}
	bOK &= ValidatePW(form.PASSWORD_PWD, l_PasswordMinLen, l_PasswordMaxLen);
	bOK &= ValidatePW(form.PASSWORD_PWDVERIFY, l_PasswordMinLen, l_PasswordMaxLen);
	
	if (form.PASSWORD_PWD.value != form.PASSWORD_PWDVERIFY.value)
	{
		FlagError(form.PASSWORD_PWD, "PWDontMatch");
		FlagError(form.PASSWORD_PWDVERIFY, "PWDontMatch");

		bOK = false;
	}
		
	// If everything passed then pass this onto the global handler to submit
	if (true == bOK)
	{
		GlobalSubmitHandler(SubmitVar);		
		return true;
	}else{
		FocusFirstError();
		return false;
	}
}



function ShowPage()
{	
	document.write("<form ID=EditForm METHOD=post onsubmit='return SubmitHandler(this)'>");
	BuildBoxHeader();
	document.write("<table class=boxInside>");
	AddTR();
		AddAttrTD("COLSPAN=2 class=cellLtColor", Loc("Sec1Title"));
	EndTR();
	AddTR();
		AddAttrTD("COLSPAN=2", Loc("Sec1Blurb"));
	EndTR();
	AddTR();
		AddAttrTD("COLSPAN=2", ShowPasswordErrors());
	EndTR();
	
	
	if(window.g_PASSWORD_PasswordSet) {
		AddTR();
			AddTD(Loc("OldPass"));
			AddTD("<input type=password name=PASSWORD_PWDOLD size=20 maxlength=" + l_PasswordMaxLen + " onkeyup=enableApply()>");
		EndTR();
	}
	AddTR();
		AddTD(Loc("NewPass"));
		AddTD("<input type=password name=PASSWORD_PWD size=20 maxlength=" + l_PasswordMaxLen + " onkeyup=enableApply()>");
	EndTR();

	AddTR();
		AddTD(Loc("ConfirmPass"));
		AddTD("<input type=password name=PASSWORD_PWDVERIFY size=20 maxlength=" + l_PasswordMaxLen + " onkeyup=enableApply()>");
	EndTR();

	document.write("<TR>");
	document.write("    <TD COLSPAN=2><input type=hidden value=ENABLED name=PASSWORD_SECURITYLEVEL></TD>");
	document.write("<TR>");

	document.write("</table>");
	BuildBoxFooter();

	AddApplyCancel("EditForm");
	document.write("</form>");
}
	
</script>
<html>
	<script>BuildPage(Loc("PageTitle"), Loc("PageBlurb"), "ShowPage()");</script>
</html>
