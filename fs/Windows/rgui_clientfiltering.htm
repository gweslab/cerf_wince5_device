<noscript><body bgcolor=#d6dff5><center><b><font color=#6487dc>Javascript support is required to display this page</font></b></center></body></noscript>
<script src="ParsedGeneralUtils.js" language="javascript"></script><script src="../remoteadminimages/GeneralUtils.js" language="javascript"></script>
<script src="ClientFiltering_Loc.js" language="javascript"></script>
<script language="javascript">


var _IP					= 0;
var _Enabled			= 1;
var _OutboundPortLow	= 2;
var _OutboundPortHigh	= 3;
var _Protocol			= 4;
var _DayStart			= 5;
var _DayEnd				= 6;
var _HourStart			= 7;
var _HourEnd			= 8;
var _Key				= 9;
var _Description		= 10;
 
var l_ClientList = new Array();
// Now we need to parse out the ton o stuff that the firewall module gives us for the entries we actualy care about

var FlagDisabled	= parseInt(g_FIREWALL_Const["FWF_DISABLED"]);

var FlagDOW			= parseInt(g_FIREWALL_Const["FWM_DAY_OF_WEEK"]);
var FlagTOD			= parseInt(g_FIREWALL_Const["FWM_TIME_OF_DAY"]);
var FlagSchedule	= FlagDOW | FlagTOD;

var	FlagUDP			= g_FIREWALL_Const["PROTOCOL_UDP"];
var FlagTCP			= g_FIREWALL_Const["PROTOCOL_TCP"];


// As client rules are actualy just Outbound blocking rules we need to look for rules with these flags
var FlagBlock		= parseInt(g_FIREWALL_Const["FWF_BLOCK"]);
var FlagOutbound	= parseInt(g_FIREWALL_Const["FWF_OUTBOUND"]);

var FlagsClient = FlagBlock | FlagOutbound;

for (Key in g_FIREWALL_PrivateHost)
{
	// Only items with PrivateHost's can be client filter rules.
	if (FlagsClient & g_FIREWALL_Flags[Key] & "171.171.171.171" != g_FIREWALL_PrivateHost[Key])
	{
		// Found an outbound rule.
		IP			= g_FIREWALL_PrivateHost[Key];
		Enabled		= !(FlagDisabled & g_FIREWALL_Flags[Key]);
		
		PortLow		= g_FIREWALL_PortMin[Key];
		PortHigh	= g_FIREWALL_PortMax[Key];

		TimeStart = TimeEnd = DayStart = DayEnd = 0;
		if (FlagDOW &  g_FIREWALL_Mask[Key])
		{
			DayStart  = ExtractDayStart(g_FIREWALL_DayOfWeek[Key]);
			DayEnd    = ExtractDayEnd(g_FIREWALL_DayOfWeek[Key]);
		}

		if (FlagTOD &  g_FIREWALL_Mask[Key])
		{
			TimeStart = g_FIREWALL_HourStart[Key];
			TimeEnd   = g_FIREWALL_HourEnd[Key];
		}
		
		switch (g_FIREWALL_Protocol[Key])
		{
			case FlagUDP:
			{
				Protocol = "UDP";
			}break;
			
			case FlagTCP:
			{
				Protocol = "TCP";
			}break;
			
			default:
			{
				Protocol = "ERROR";
			}
		}
		
		l_ClientList[Key] = new Array(IP, Enabled, PortLow, PortHigh, Protocol, DayStart, DayEnd, TimeStart, TimeEnd, Key, g_FIREWALL_Protocol[Key])
	}
}

var g_EditIP = "...";


var DaysOfWeek = new Array(Loc("Sun"), Loc("Mon"), Loc("Tue"), Loc("Wed"), Loc("Thr"), Loc("Fri"), Loc("Sat"));

function AddDOWOptions(Selected)
{

	for (var iDay = 0; iDay < DaysOfWeek.length; iDay++)
	{
		Select = (Selected == iDay) ? " SELECTED" : " ";

		document.write("<OPTION value=" + iDay + Select + ">" + DaysOfWeek[iDay] + "</OPTION>");
	}
}

function FormatHour(Hour, TwentyFourHourFormat)
{
	if (TwentyFourHourFormat)
	{
		// easy
		Format = Hour + ":00";
	}else{
		var pm = (Hour > 11);
		Hour = (Hour % 12);
		
		if (0 == Hour)
			Hour = 12;
		
		Format =  Hour + ":00 ";
		if (pm)
		{
			Format += Loc("PM");
		}else{
			Format += Loc("AM");
		}
	}
	
	return Format;
}


function AddAMPMHourOptions()
{
	var hour = 0;
	var i = 0;
	for (i=0; i < 24; i++)
	{
		hour = (i % 12);
		
		if (0 == hour)
			hour = 12;

		document.write("<OPTION value=" + i + ">" + hour + ":00 ");

		if (i < 12)
		{
			document.write(Loc('AM'));
		}else{
			document.write(Loc('PM'));
		}
		document.write("</OPTION>");
	}
}


function ShowErrors() 
{
	return new String("");
}

function BuildFilterString(Key)
{
	var Filter = Loc("Always");

	if (l_ClientList[Key][_DayStart] || l_ClientList[Key][_DayEnd] || l_ClientList[Key][_HourStart] || l_ClientList[Key][_HourEnd])
	{
		Filter = DaysOfWeek[l_ClientList[Key][_DayStart]] + "-" +
				 DaysOfWeek[l_ClientList[Key][_DayEnd]] + " " +
				 FormatHour(l_ClientList[Key][_HourStart], false) + "-" +
				 FormatHour(l_ClientList[Key][_HourEnd], false);
	}

	return Filter;
}

function toggleFilterTimeControls(Always)
{
	FindObject("ClientFilterStartDay").disabled = Always;
	FindObject("ClientFilterEndDay").disabled = Always;
	FindObject("ClientFilterStartTime").disabled = Always;
	FindObject("ClientFilterEndTime").disabled = Always;
	
	FindObject("ClientFilterAlwaysEnabled").checked = Always;
	FindObject("ClientFilterNotAlwaysEnabled").checked = !Always;

}

function EditRow(Key)
{
	ClearError();

	form = FindObject("EditForm");

	SetIP(l_ClientList[Key][_IP], "g_EditIP");	

	form.HiddenKey.value			= l_ClientList[Key][_Key				]
	form.HiddenEnabled.value		= l_ClientList[Key][_Enabled			]
	form.HiddenDescription.value	= l_ClientList[Key][_Description		]

	form.DtaOutboundPortLow.value	= l_ClientList[Key][_OutboundPortLow	];	
	form.DtaOutboundPortHigh.value	= l_ClientList[Key][_OutboundPortHigh	];	

	// Set the dropdowns to the correct values
	setSelection("DtaProtocol", l_ClientList[Key][_Protocol]);

	if (l_ClientList[Key][_DayStart] || l_ClientList[Key][_DayEnd] || l_ClientList[Key][_HourStart] || l_ClientList[Key][_HourEnd])
	{
		toggleFilterTimeControls(false);

		setSelection("ClientFilterStartDay",	l_ClientList[Key][_DayStart	]);
		setSelection("ClientFilterEndDay",		l_ClientList[Key][_DayEnd	]);
		setSelection("ClientFilterStartTime",	l_ClientList[Key][_HourStart]);
		setSelection("ClientFilterEndTime",		l_ClientList[Key][_HourEnd	]);
	}else{
		toggleFilterTimeControls(true);

		setSelection("ClientFilterStartDay",	0);
		setSelection("ClientFilterEndDay",		0);
		setSelection("ClientFilterStartTime",	0);
		setSelection("ClientFilterEndTime",		0);
	}
	
	// Update the buttons to make sense
	var btn = FindObject("Apply");
	btn.value=Loc("BTNUpdate");

	btn.disabled = true;

	btn = FindObject("Cancel");
	btn.disabled = false;
			  
}

function ResetEditForm()
{
	G_Dirty = false;
	ClearError();

	var Form = FindObject("EditForm");
	Form.reset();

	toggleFilterTimeControls(true);

	var btn = FindObject("Apply");
	btn.value=Loc("BTNAdd");
	btn.disabled = true;

	btn = FindObject("Cancel");
	btn.disabled = true;

}



function AddDOWTODSelects(enable)
{
	if (enable)
		Enabled = "enabled";
	else
		Enabled = "disabled";
		
	document.write("<SELECT id=ClientFilterStartDay onchange=enableApply(); size=1 " + Enabled + ">");
		AddDOWOptions("");
	document.write("</SELECT>");
	
	document.write(" " + Loc("To") + " ");
	document.write("<SELECT id=ClientFilterEndDay onchange=enableApply(); size=1 " + Enabled + ">");
		AddDOWOptions("");
	document.write("</SELECT>");
	
	document.write(" " + Loc("Between") + " ");

	document.write("<SELECT id=ClientFilterStartTime onchange=enableApply(); size=1 " + Enabled + ">");
		AddAMPMHourOptions();
	document.write("</SELECT>");

	document.write(" " + Loc("And") + " ");

	document.write("<SELECT id=ClientFilterEndTime onchange=enableApply(); size=1 " + Enabled + ">");
		AddAMPMHourOptions();
	document.write("</SELECT>");
}

function SubmitHandler(SubmitVar) 
{		
	var bOK = true;
	ClearError();
	
	//SubmitVar.action = "Debug";
	
	var FormVar = FindObject("EditForm");
	
	bOK = ValidateIP("g_EditIP");
	bOK &= ValidatePort(FormVar.DtaOutboundPortLow, true);
	bOK &= ValidatePortEmptyOK(FormVar.DtaOutboundPortHigh, true);
	
	if (bOK)
	{
		// We have a trick here.  When adding a new item if we setup the return array values
		// with a key that is not recognized the backend will assume a new entry and create it
		// so we can format updates / adds exactly the same way.  New rule Key value MUST = NEW
		var Key = FormVar.HiddenKey.value;
		
		// A second trick is that we are going to change the edit form control names to match
		// the format the backend requires.  EG a_Port_Item_KEY=xyz  
		// This will ONLY work if we are going to reload the page after submit which in this case we are
		
		// build the mask value	
		//FWM_PRIVATE_HOST | FWM_PORT | FWM_PROTOCOL | (FlagSchedule )
		FormVar.HiddenMask.value			= parseInt(g_FIREWALL_Const["FWM_PRIVATE_HOST"]) | 
											  parseInt(g_FIREWALL_Const["FWM_PORT"]) |
											  parseInt(g_FIREWALL_Const["FWM_PROTOCOL"]);
												
		FormVar.HiddenMask.name				= "a_FIREWALL_Mask_"+Key;
		FormVar.HiddenDescription.name		= "a_FIREWALL_Description_"+Key;

		FormVar.g_EditIP.name				= "a_FIREWALL_PrivateHost_"+Key;
		FormVar.HiddenHostFamily.name		= "a_FIREWALL_PrivateHostFamily_"+Key;
		
		FormVar.DtaOutboundPortLow.name		= "a_FIREWALL_PortMin_"+Key;
		FormVar.DtaOutboundPortHigh.name	= "a_FIREWALL_PortMax_"+Key;

		FormVar.HiddenProtocol.name			= "a_FIREWALL_Protocol_"+Key;
		FormVar.HiddenProtocol.value		= ("UDP" == FormVar.DtaProtocol.value ? FlagUDP : FlagTCP);
		
		// Flags FlagsClient | (FWF_DISABLED)
		FormVar.HiddenFlags.name			= "a_FIREWALL_Flags_"+Key;
		FormVar.HiddenFlags.value			= FlagsClient;

		if ('false' == FormVar.HiddenEnabled.value)
			FormVar.HiddenFlags.value			|= FlagDisabled;

		// Now we have to build the scheduleing information up if they are not always
		if (FormVar.ClientFilterNotAlwaysEnabled.checked)
		{
			// scheduled, so have to add the mask bits and fill in the schedule

			if(FormVar.ClientFilterStartTime.value == FormVar.ClientFilterEndTime.value) {
				FlagSchedule &= ~FlagTOD;
			}
			FormVar.HiddenMask.value |= FlagSchedule;
			
			FormVar.HiddenDOWMask.name	= "a_FIREWALL_DayOfWeek_"+Key;

			FormVar.HiddenDOWMask.value	= BuildDayMask(FormVar.ClientFilterStartDay.value, FormVar.ClientFilterEndDay.value);

			
			FormVar.ClientFilterStartTime.name	= "a_FIREWALL_HourStart_"+Key;
			FormVar.ClientFilterEndTime.name	= "a_FIREWALL_HourEnd_"+Key;
		}

		GlobalSubmitHandler(SubmitVar);		

		return true;
	}else{
		FocusFirstError();
		return false;
	}
}

function ShowEditSection()
{
	// note we default this to Always and having the "From" entries disabled
	
	BuildBoxHeader();
	document.write("<table class=boxInside>");
		document.write("<form METHOD=post name=EditForm onsubmit='return SubmitHandler(this)'>");

			// the shadow items will have there name's set during the submit process and will be sent to the backend
			AddShadow("HiddenEnabled", true);
			AddShadow("HiddenDescription", '');
			AddShadow("HiddenKey", "NEW");
			AddShadow("HiddenHostFamily", '2');
			AddShadow("HiddenMask", '');
			AddShadow("HiddenFlags", '');
			AddShadow("HiddenProtocol", '');
			AddShadow("HiddenDOWMask", '');

			AddTR();
				AddTD(Loc('COLIP'));
				AddTD(Loc('COLOP'));
				AddTD(Loc('COLProtocol'));
			EndTR();

			AddTR();
				AddTD(BuildIPInput(g_EditIP, "g_EditIP", true));

				AddTD("<input id=DtaOutboundPortLow  maxLength=5 onKeyPress=NumOnly(); onBlur='ValidatePort(this, false);' onkeyup=enableApply(); size=5> - " +
					  "<input id=DtaOutboundPortHigh maxLength=5 onKeyPress=NumOnly(); onBlur='ValidatePortEmptyOK(this, false);' onkeyup=enableApply(); size=5>");

				document.write("<TD><select id=DtaProtocol onchange=enableApply();>");
					document.write("    <option value=TCP selected>"+Loc('TCP'));
					document.write("    <option value=UDP>"+Loc('UDP'));
				document.write("</select></TD>");
			EndTR();

			AddBar();
			AddTR();
				document.write("<TD>");
					document.write("<INPUT id=ClientFilterAlwaysEnabled onclick=enableApply();toggleFilterTimeControls(true); type=radio value=0 checked>");
					document.write(" "+Loc('Always'));
				document.write("</TD>");
			EndTR();
			
			AddTR();
				document.write("<TD colspan=5>");
					document.write("<INPUT id=ClientFilterNotAlwaysEnabled onclick=enableApply();toggleFilterTimeControls(false); type=radio value=1>");
					document.write(" " + Loc('From') + " ");
					AddDOWTODSelects(false);
				document.write("</TD>");
			EndTR();
		
			AddBar();
			
			document.write("<TR><TD COLSPAN=5><input id=Apply type=submit disabled value="+Loc('BTNAdd')+"><input id=Cancel type=button disabled value="+Loc('BTNClear')+" onclick=ResetEditForm()></TD></TR>");	

		document.write("</form>");
	document.write("</TABLE>");
	BuildBoxFooter();
}

function ToggleActive(Checkbox, Key) 
{	
	var hdn = FindObject("HiddenAction");
	
	hdn.name = "a_FIREWALL_Enabled_"+Key;
	hdn.value = (true==Checkbox.checked)?1:0;
	
	document.forms["PortForward"].submit();	
}


function DeleteRow(Key)  
{
	var hdn = FindObject("HiddenAction");

	hdn.name = "a_FIREWALL_Delete_" + Key;
	hdn.value = "YES";

	document.forms["PortForward"].submit();
}

function ShowListSection()
{
	var Filter = "";
		
	BuildBoxHeader();
	
	document.write("<table class=PortForwardTable border=1 cellspacing=0 cellpadding=0>");	
	document.write("<form name=PortForward METHOD=post onsubmit='GlobalSubmitHandler(this)'>");

	document.write("<input type=hidden id=HiddenAction value=''>");

	document.write("<TR class=PortForwardKey>");
		AddAttrTD("width=10%", Loc("COLBlock"));
		AddAttrTD("width=10%", Loc("COLIP"));
		AddAttrTD("width=10%", Loc("COLOP"));
		AddAttrTD("width=10%", Loc("COLProtocol"));
		AddAttrTD("width=40%", Loc("COLFilter"));
		AddAttrTD("width=10%", Loc("COLEdit"));
		AddAttrTD("width=10%", Loc("COLDelete"));
	document.write("</TR>");

	for(Key in l_ClientList)
	{
		Filter = BuildFilterString(Key);
		
		document.write("<TR>");		
			AddTD("<input onClick='ToggleActive(this, " + l_ClientList[Key][_Key] + ");' type=checkbox id=CheckEnabled" + (l_ClientList[Key][_Enabled]?" CHECKED":"")+">");
	
			AddTD(l_ClientList[Key][_IP					]);
			AddTD(l_ClientList[Key][_OutboundPortLow	] + " - " + l_ClientList[Key][_OutboundPortHigh]);
			AddTD(l_ClientList[Key][_Protocol			]);
			AddTD(Filter);

			AddTD("<a class=PortForwardLink href=javascript:EditRow('" + Key + "');>"+Loc('Edit')+"</A>");
			AddTD("<a class=PortForwardLink href=javascript:DeleteRow('" + l_ClientList[Key][_Key] + "');>"+Loc('Delete')+"</A>");

		document.write("</TR>");
	}
	
	document.write("</form>");
	document.write("</TABLE>");	

	BuildBoxFooter();
}

function ShowPage()
{	
	document.write("<table class=boxInside>");

	ShowEditSection();
	ShowListSection();
		
	document.write("</table>");
}
	
</script>

	<script>
	BuildPage(Loc("PageTitle"), Loc("PageBlurb")+"<BR><BR>"+Loc("PageBlurb2"), "ShowPage()");
	</script>
